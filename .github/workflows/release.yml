name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Releases + push CHANGELOG commit back to main
  id-token: write   # provenance attestation (effective only for public repos)

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 7

  # ── 2. Publish to NuGet ──────────────────────────────────────────────────────
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test
    environment: nuget-publish

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Idempotent: sets the version even if it already matches the tag
      # (release.sh bumps it before tagging, so it's usually already correct).
      - name: Sync version in manifest
        run: |
          perl -i -pe \
            "s|<Version>[^<]*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|g" \
            src/Tracelit/Tracelit.csproj

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Tracelit/Tracelit.csproj \
            --no-build \
            --configuration Release \
            --output dist

      - name: Push to NuGet.org
        run: |
          dotnet nuget push dist/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ── 3. GitHub Release + CHANGELOG ────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for changelog diff

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build changelog entry and update CHANGELOG.md
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          VERSION="${CURRENT_TAG#v}"
          TODAY="$(date -u +%Y-%m-%d)"

          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -1 || true)

          if [[ -n "${PREV_TAG}" ]]; then
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${CURRENT_TAG}"
            COMMITS=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s" --no-merges || true)
          else
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/commits/${CURRENT_TAG}"
            COMMITS=$(git log "${CURRENT_TAG}" --pretty=format:"- %s" --no-merges || true)
          fi

          # Write release notes (commit subjects only) for the GitHub Release body
          printf '%s\n' "${COMMITS}" > /tmp/release_notes.txt

          # Write the full changelog entry to a temp file to avoid quoting issues
          {
            printf '## [%s] - %s\n' "${VERSION}" "${TODAY}"
            printf '%s\n' "${COMMITS}"
            printf '\n[%s]: %s\n' "${VERSION}" "${COMPARE_URL}"
          } > /tmp/changelog_entry.txt

          # Prepend the entry after the first "---" separator in CHANGELOG.md
          python3 - <<'PYEOF'
          with open('/tmp/changelog_entry.txt') as f:
              entry = f.read().strip()
          with open('CHANGELOG.md') as f:
              content = f.read()

          sep_idx = content.find('\n---\n')
          if sep_idx != -1:
              after_sep = sep_idx + 5   # len('\n---\n')
              content = content[:after_sep] + '\n' + entry + '\n' + content[after_sep:]
          else:
              content += '\n' + entry + '\n'

          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          print('CHANGELOG.md updated')
          PYEOF

      - name: Commit and push CHANGELOG.md to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git fetch origin main
          git checkout main
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "CHANGELOG.md already up to date — nothing to commit"
          else
            git commit -m "chore: update CHANGELOG.md for ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin main
          fi

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const tag  = '${{ steps.version.outputs.tag }}';
            const ver  = '${{ steps.version.outputs.version }}';
            const pre  = '${{ steps.version.outputs.prerelease }}' === 'true';
            const body = fs.readFileSync('/tmp/release_notes.txt', 'utf8').trim()
                      || `Release ${tag}`;

            await github.rest.repos.createRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              tag_name:   tag,
              name:       `v${ver}`,
              body,
              prerelease: pre,
              draft:      false,
            });
