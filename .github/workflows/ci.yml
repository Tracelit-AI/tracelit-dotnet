name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.0', '9.0']

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          # Always ensure .NET 8 runtime is present (current target framework)
          # plus the matrix SDK version for build/API compatibility testing.
          dotnet-version: |
            8.0.x
            ${{ matrix.dotnet }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload coverage
        if: matrix.dotnet == '9.0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          retention-days: 7

  build:
    name: Build & Pack
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Tracelit/Tracelit.csproj \
            --no-build \
            --configuration Release \
            --output dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: dist
          retention-days: 1
